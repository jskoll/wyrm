# Example .tmuxconfig with nested splits layout
# Demonstrates pre_window (interpreter setup), hooks, and startup window
# Place this in your project root and run: wyrm -config example-splits.tmuxconfig

[session]
name = "myproject"
root = "."
# Run setup before session creation (pull code, install deps, etc)
on_project_start = "git pull && npm install"
# Run cleanup when session is killed
on_project_exit = "npm run cleanup"
# Focus the "editor" window when session starts
startup_window = "editor"
startup_pane = 0

[[windows]]
name = "editor"
# Run nvm setup in all panes before their commands (useful with Node, Python, Ruby, etc)
pre_window = "nvm use 18"

  [[windows.splits]]
  type = "h"
  size = 70
  command = "nvim"

    [[windows.splits.children]]
    type = "v"
    size = 50
    command = "npm test -- --watch"

    [[windows.splits.children]]
    type = "v"
    command = "# logs"

[[windows]]
name = "server"
pre_window = "nvm use 18"

  [[windows.splits]]
  type = "h"
  size = 60
  command = "npm run dev"

    [[windows.splits.children]]
    type = "v"
    command = "# monitoring"

[[windows]]
name = "git"

  [[windows.splits]]
  type = "v"
  size = 40
  command = "lazygit"

    [[windows.splits.children]]
    type = "h"
    command = "git log --oneline"
