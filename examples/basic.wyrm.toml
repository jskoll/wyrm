# Example .wyrm.toml file
# Place this in your project root as .wyrm.toml and run: wyrm

[session]
name = "myproject"
root = "."
# Hooks: run commands before session creation and after session kill
on_project_start = "echo 'Setting up project...'"
on_project_exit = "echo 'Cleaning up...'"
# Which window to focus when session starts
startup_window = "editor"

[[windows]]
name = "editor"
layout = "even-horizontal"
# Run this setup command in all panes before their commands (useful for nvm use, rbenv shell, etc)
pre_window = "echo 'Editor pane ready'"

[[windows.panes]]
command = "nvim"

[[windows.panes]]
command = "# sidebar terminal"

[[windows]]
name = "tests"
layout = "tiled"
pre_window = "npm run test:setup"

[[windows.panes]]
command = "npm test -- --watch"

[[windows.panes]]
command = "# test logs"

[[windows]]
name = "server"
layout = "main-horizontal"

[[windows.panes]]
command = "npm run dev"

[[windows.panes]]
command = "# monitoring"
