site_name: wyrm
site_description: Repeatable tmux session layouts from a TOML config
site_url: https://jskoll.github.io/wyrm/
repo_url: https://github.com/jskoll/wyrm
repo_name: jskoll/wyrm
edit_uri: edit/main/docs/

docs_dir: docs

nav:
  - Home: index.md
  - Configuration reference: configuration.md
  - Examples: examples.md
  - Security: security.md
  - Contributing: contributing.md

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
